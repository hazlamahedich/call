name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo test --filter=web

  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: call_test
        options: >--health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ env.PYTHON_VERSION }}
          restore-keys: pip-${{ runner.os }}-${{ env.PYTHON_VERSION }}

      - run: python -m pip install --upgrade pip
      - run: |
          cd apps/api &&
          python -m pip install -r requirements.txt .

      - name: Run backend tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/call_test
          TEST_RLS_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/call_test
        run: |
          cd apps/api &&
          python -m pytest tests/ -v --tb=short

      - name: Run backend tests (RLS)
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/call_test
          TEST_RLS_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/call_test
        run: |
          cd apps/api &&
          python -m pytest tests/ -v -m "rls or tenant" --tb=short

  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile.

      - name: Install Playwright
        run: pnpm exec playwright install --with-deps

      - name: Run E2E tests
        env:
          E2E_CLERK_EMAIL: ${{ secrets.E2E_CLERK_EMAIL }}
          E2E_CLERK_PASSWORD: ${{ secrets.E2E_CLERK_PASSWORD }}
        run: pnpm exec playwright test
